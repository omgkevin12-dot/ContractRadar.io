[[headers]]
  for = "/*"
  [headers.values]
    # Babel standalone requires unsafe-eval to execute compiled JSX at runtime.
    # unsafe-inline covers the window.onerror handler in the HTML.
    Content-Security-Policy = "default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
